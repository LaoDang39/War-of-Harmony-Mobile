name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK dependencies
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653" \
            "cmake;3.22.1"

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            pkg-config \
            make \
            cmake \
            ninja-build \
            gettext \
            wget

      - name: Grant execute permission for scripts
        run: |
          chmod +x gradlew
          chmod +x app/jni/get_deps.sh

      - name: Download JNI third-party dependencies
        working-directory: app/jni
        run: ./get_deps.sh

      - name: Build JNI prerequisite libraries (arm64-v8a)
        working-directory: app/jni
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
        run: |
          make \
            HOST=aarch64-linux-android \
            TARGET=aarch64-linux-android \
            ABI=arm64-v8a \
            API=21 \
            all

      - name: Build release APK
        run: ./gradlew --no-daemon clean assembleRelease

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/*/release/*.apk
          if-no-files-found: error
